{% extends "base_admin.html" %}
{% block title %}Edit User{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('user_management') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-1"></i> Back to User Management
    </a>
</div>

<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2"><i class="fas fa-user-edit me-2"></i>Edit User</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-user me-1"></i>Username</label>
                    <input type="text" class="form-control" value="{{ user.username }}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-envelope me-1"></i>Email</label>
                    <input type="text" class="form-control" value="{{ user.email }}" readonly>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-signature me-1"></i>Name</label>
                    <input type="text" class="form-control" value="{{ user.first_name }} {{ user.last_name }}" readonly>
                </div>
                <div class="col-md-6">
                    <label for="role" class="form-label"><i class="fas fa-shield-alt me-1"></i>Role</label>
                    <select class="form-select" id="role" name="role">
                        <option value="staff" {% if user.role == 'staff' %}selected{% endif %}>Staff</option>
                        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
            </div>
            
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Update User
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
